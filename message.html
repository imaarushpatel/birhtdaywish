<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Final birthday message" />
  <title>Final Message</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="message" class="message-page bright">
  <div class="rose-layer" id="rose-layer" aria-hidden="true"></div>
  <div class="petal-layer" id="petal-layer" aria-hidden="true"></div>

  <main class="message-stage">
    <article class="message-final-card">
      <p class="mini-label">Final Note</p>
      <h1>Happy Birthday, Khushi</h1>
      <p>Wishing you a joyful birthday and a fantastic year ahead.</p>
      <p>Stay healthy, keep smiling, and keep achieving your goals.</p>
      <p>May this year bring you confidence, growth, and great memories.</p>
      <div class="message-actions">
        <button class="btn" id="play-joy">Play Joyful Tune</button>
        <button class="btn" id="back-party">Back To Party</button>
      </div>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
