<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive birthday experience for Khushi" />
  <title>Happy Birthday Khushi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="surprise" class="surprise-page dim">
  <div class="rose-layer" id="rose-layer" aria-hidden="true"></div>
  <div class="petal-layer" id="petal-layer" aria-hidden="true"></div>

  <main class="party-stage">
    <header class="party-top">
      <h2>Happy Birthday, Khushi</h2>
      <button class="btn small" id="action-btn">Lights On</button>
    </header>

    <section class="center-panel" id="center-panel">
      <p class="mini-label">Interactive Surprise</p>
      <h3 id="step-title">Ready to start the birthday setup?</h3>
      <p id="step-hint">Tap the top button and enjoy each step.</p>
      <div class="status-wave" id="status-wave" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </section>

    <section class="decor-zone" id="decor-zone">
      <div class="banner" id="banner">HAPPY BIRTHDAY</div>
      <div class="balloon-zone" id="balloon-zone"></div>

      <article class="cake-card" id="cake-card">
        <div class="cake">
          <span class="candle"></span>
          <span class="flame"></span>
          <span class="layer top"></span>
          <span class="layer mid"></span>
          <span class="layer bottom"></span>
        </div>
      </article>

      <div class="final-row" id="final-row">
        <article class="media-card" id="media-card">
          <h4>Memory Highlights</h4>
          <div class="media-frame" id="media-frame"></div>
          <div class="media-actions">
            <button class="btn small" id="media-prev">Prev</button>
            <button class="btn small" id="media-next">Next</button>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
